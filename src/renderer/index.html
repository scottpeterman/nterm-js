<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nterm</title>
<link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ─── Top Bar ──────────────────────────────────────────── -->
    <div id="topbar">
        <div class="topbar-left">
            <span class="app-title">nterm</span>
        </div>
        <div class="topbar-center">
            <button id="btn-quick-connect" title="New Connection (Ctrl+N)">+ Connect</button>
        </div>
        <div class="topbar-right">
            <button id="btn-theme-toggle" title="Toggle theme">&#x263E;</button>
        </div>
    </div>

    <!-- ─── Main Layout ──────────────────────────────────────── -->
    <div id="main">

        <!-- Session Tree (left pane) -->
        <div id="sidebar">
            <div class="sidebar-header">
                <span>Sessions</span>
                <button id="btn-load-sessions" title="Load sessions YAML">&#x1F4C2;</button>
            </div>
            <div id="session-search-wrap">
                <input type="text" id="session-search" placeholder="Filter..." spellcheck="false">
            </div>
            <div id="session-tree"></div>
        </div>

        <!-- Resize handle -->
        <div id="splitter"></div>

        <!-- Terminal Tabs (right pane) -->
        <div id="terminal-area">
            <div id="tab-bar">
                <div id="tab-list"></div>
            </div>
            <div id="terminal-container">
                <div id="welcome" class="welcome-screen">
                    <div class="welcome-content">
                        <h2>nterm</h2>
                        <p>Load a sessions file or click <strong>+ Connect</strong> above.</p>
                        <p class="welcome-hint">A network-aware SSH terminal that understands what it sees.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── Connection Dialog (modal) ────────────────────────── -->
    <div id="connect-dialog" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <span>New Connection</span>
                <button class="modal-close" id="btn-dialog-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <label for="dlg-host">Host</label>
                    <input type="text" id="dlg-host" placeholder="192.168.1.1" spellcheck="false" autocomplete="off">
                </div>
                <div class="form-row">
                    <label for="dlg-port">Port</label>
                    <input type="number" id="dlg-port" value="22" min="1" max="65535">
                </div>
                <div class="form-row">
                    <label for="dlg-username">Username</label>
                    <input type="text" id="dlg-username" placeholder="admin" spellcheck="false" autocomplete="off">
                </div>

                <!-- Auth method selector -->
                <div class="form-row">
                    <label for="dlg-auth-method">Auth Method</label>
                    <select id="dlg-auth-method">
                        <option value="password">Password</option>
                        <option value="keyfile">Key File</option>
                        <option value="agent">SSH Agent</option>
                        <option value="key-and-password">Key + Password</option>
                    </select>
                </div>

                <!-- Password field -->
                <div class="form-row" id="row-password">
                    <label for="dlg-password">Password</label>
                    <input type="password" id="dlg-password" placeholder="Password" autocomplete="off">
                </div>

                <!-- Key file fields -->
                <div class="form-row" id="row-keyfile" style="display:none;">
                    <label for="dlg-keypath">Key File</label>
                    <div class="input-with-button">
                        <input type="text" id="dlg-keypath" placeholder="~/.ssh/id_rsa" spellcheck="false" readonly>
                        <button id="btn-browse-key" title="Browse...">...</button>
                    </div>
                </div>
                <div class="form-row" id="row-passphrase" style="display:none;">
                    <label for="dlg-passphrase">Passphrase</label>
                    <input type="password" id="dlg-passphrase" placeholder="Key passphrase (if any)" autocomplete="off">
                </div>

                <!-- Options -->
                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="dlg-legacy-mode">
                        Legacy mode (older devices)
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-dialog-cancel" class="btn-secondary">Cancel</button>
                <button id="btn-dialog-connect" class="btn-primary">Connect</button>
            </div>
        </div>
    </div>

    <!-- ─── Status Bar ───────────────────────────────────────── -->
    <div id="statusbar">
        <span id="status-message">Ready</span>
        <span id="status-sessions">0 sessions</span>
    </div>

<script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
<script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>

    <script src="renderer.js"></script>
</body>
</html>
