<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="nterm-js">
  <title>nterm-js</title>

  <style>
    svg {
      --frame: #33FF33;
      --arc:   #FFB000;
      --bg:    #0A0E14;
    }
    .stroke-frame { stroke: var(--frame); fill: none; }
    .fill-frame   { fill:   var(--frame); stroke: none; }
  </style>

  <defs>
    <!-- diffuse amber halo replaces orbital arcs at icon scale -->
    <filter id="halo" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <!-- tight green glow on frame + prompt -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="1.3"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded-square tile -->
  <rect width="512" height="512" rx="96" fill="#0A0E14"/>

  <!-- Amber bloom halo behind hex -->
  <polygon
    points="76,256 166,100 346,100 436,256 346,412 166,412"
    stroke="#FFB000"
    stroke-width="40"
    fill="none"
    opacity="0.6"
    filter="url(#halo)"/>

  <!-- Green hex frame -->
  <polygon
    points="76,256 166,100 346,100 436,256 346,412 166,412"
    class="stroke-frame"
    stroke-width="18"
    stroke-linejoin="miter"
    filter="url(#glow)"/>

  <!-- >_ prompt -->
  <g filter="url(#glow)">
    <polyline
      points="146,180 256,256 146,332"
      class="stroke-frame"
      stroke-width="42"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <rect x="296" y="220" width="76" height="76" class="fill-frame"/>
  </g>
</svg>
